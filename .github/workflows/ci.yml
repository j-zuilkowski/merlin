name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# NOTE: Developed locally with Xcode 26.5. GitHub runners ship Xcode 16.x (macos-15).
# The workflow will flag any build breakage introduced on main; local builds remain
# the authoritative check for Xcode-26-specific APIs until GitHub adds Xcode 26 runners.

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Block local-only credential files
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)api-keys\.json$|(^|/)\.env(\.|$)|(^|/)secrets\.json$|(^|/)\.merlin/api-keys\.json$'; then
            echo "Local-only credential file is tracked. Remove it before pushing."
            exit 1
          fi

      - name: Select Xcode
        run: |
          # Use the latest Xcode available on the runner
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version

      - name: Regenerate Xcode project from project.yml
        run: |
          # The committed Merlin.xcodeproj/project.pbxproj predates xcodegen
          # adoption and is .gitignored (the rule was added later but doesn't
          # untrack the existing file). It drifts whenever a source file is
          # added, renamed, or deleted on main without a manual pbxproj
          # commit — that has broken CI on multiple prior pushes. project.yml
          # is the single source of truth; regenerate from it so CI always
          # sees the same file-graph as a fresh local build.
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme Merlin \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            SYMROOT=build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO \
            build \
            | grep -E 'error:|warning:|BUILD SUCCEEDED|BUILD FAILED'

      - name: Run Unit Tests
        timeout-minutes: 25
        run: |
          set -o pipefail
          # -test-timeouts-enabled / -default-test-execution-time-allowance:
          # cap any single test at 60s so a hung test fails fast with a clear
          # name instead of burning the 6h runner cap (which happened once
          # already: testProviderAddendumAppearsInSystemPrompt wedged the
          # whole job for 6h on a macos-15 runner while passing locally in
          # 0.5s).
          # -maximum-concurrent-test-simulator-destinations 1 and
          # -disable-concurrent-destination-testing: deterministic serial
          # execution removes the most plausible source of the wedge —
          # XCTest concurrency interacting with the actor entry points in
          # DomainRegistry / AppSettings under the runner's specific load.
          xcodebuild \
            -scheme MerlinTests \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            SYMROOT=build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 60 \
            -maximum-test-execution-time-allowance 120 \
            -maximum-concurrent-test-simulator-destinations 1 \
            -disable-concurrent-destination-testing \
            test \
            | grep -E 'error:|Test Suite|Test Case|passed|failed|exceeded|BUILD SUCCEEDED|BUILD FAILED'
