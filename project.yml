name: Merlin
options:
  bundleIdPrefix: com.merlin
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "2.2.4"
    CURRENT_PROJECT_VERSION: 23

targets:
  Merlin:
    type: application
    platform: macOS
    sources:
      - path: Merlin/
        excludes:
          - Skills/Builtin/**
          - KAG/**
      - path: Merlin/KAG
        type: group
      # Bundled as a folder reference so installBuiltinSkills() can read
      # Bundle.main/Builtin and copy the skills to ~/.merlin/skills at launch.
      - path: Merlin/Skills/Builtin
        type: folder
    dependencies:
      - target: merlin-discipline
        embed: true
        copy:
          destination: executables
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.app
        BUNDLE_IDENTIFIER: com.merlin.app
        PRODUCT_NAME: Merlin
        INFOPLIST_FILE: Merlin/Info.plist
        CODE_SIGN_ENTITLEMENTS: Merlin/Merlin.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: Merlin Dev Signing
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  merlin-discipline:
    type: tool
    platform: macOS
    sources:
      - MerlinDisciplineCLI/
      - Merlin/Discipline/
      - Merlin/Telemetry/
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.discipline-cli
        SWIFT_VERSION: "5.10"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: MERLIN_DISCIPLINE_CLI

  TestTargetApp:
    type: application
    platform: macOS
    sources: [TestTargetApp/]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.TestTargetApp
        BUNDLE_IDENTIFIER: com.merlin.TestTargetApp
        PRODUCT_NAME: TestTargetApp
        INFOPLIST_FILE: TestTargetApp/Info.plist

  MerlinTests:
    type: bundle.unit-test
    platform: macOS
    sources: [MerlinTests/, TestHelpers/]
    resources:
      - path: project.yml
      - path: RELEASE-v2.2.1.md
      - path: RELEASE-v2.2.2.md
      - path: RELEASE-v2.2.3.md
      - path: RELEASE-v2.2.4.md
    dependencies:
      - target: Merlin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.MerlinTests
        BUNDLE_IDENTIFIER: com.merlin.MerlinTests
        GENERATE_INFOPLIST_FILE: YES

  MerlinLiveTests:
    type: bundle.unit-test
    platform: macOS
    sources: [MerlinLiveTests/, TestHelpers/]
    dependencies:
      - target: Merlin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.MerlinLiveTests
        BUNDLE_IDENTIFIER: com.merlin.MerlinLiveTests
        GENERATE_INFOPLIST_FILE: YES

  MerlinE2ETests:
    type: bundle.unit-test
    platform: macOS
    sources: [MerlinE2ETests/, TestHelpers/]
    dependencies:
      - target: Merlin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.MerlinE2ETests
        BUNDLE_IDENTIFIER: com.merlin.MerlinE2ETests
        GENERATE_INFOPLIST_FILE: YES

  # XCUITest surface harness (M2 / S7–S11). A bundle.ui-testing target drives the
  # real Merlin app via XCUIApplication; it cannot @testable import Merlin, so the
  # Foundation-only AccessibilityID + SettingsSection are compiled in directly.
  MerlinUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - MerlinUITests/
      - Merlin/Support/AccessibilityID.swift
      - Merlin/UI/Settings/SettingsSection.swift
    dependencies:
      - target: Merlin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.merlin.MerlinUITests
        BUNDLE_IDENTIFIER: com.merlin.MerlinUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Merlin

schemes:
  Merlin:
    build:
      targets:
        Merlin: all

  MerlinTests:
    build:
      targets:
        Merlin: all
        merlin-discipline: all
        MerlinTests: [test]
    test:
      targets: [MerlinTests]

  MerlinTests-Live:
    build:
      targets:
        Merlin: all
        MerlinLiveTests: [test]
        MerlinE2ETests: [test]
        MerlinUITests: [test]
        TestTargetApp: all
    test:
      targets: [MerlinLiveTests, MerlinE2ETests, MerlinUITests]
      environmentVariables:
        RUN_LIVE_TESTS: "1"
